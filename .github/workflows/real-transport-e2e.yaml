name: Real Transport E2E

on:
  pull_request:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: real-transport-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  RealTransport:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'

      - name: Cache MongoDB Memory Server binaries
        uses: actions/cache@v6
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-memory-server-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            mongodb-memory-server-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run deterministic real transport E2E
        if: github.event_name == 'pull_request'
        run: yarn test:e2e:real-transport:ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run all real transport E2E
        if: github.event_name == 'workflow_dispatch'
        run: yarn test:e2e:real-transport
        env:
          NODE_OPTIONS: --max-old-space-size=4096
