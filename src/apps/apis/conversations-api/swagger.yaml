openapi: 3.0.3
info:
  title: Pigeon-swarm Conversations API
  version: 1.0.0
  description: Endpoints for creating and reading conversations.
tags:
  - name: conversations
paths:
  /conversations:
    post:
      tags:
        - conversations
      summary: Create conversation
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostConversationBody'
      responses:
        '200':
          description: Conversation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResource'
    get:
      tags:
        - conversations
      summary: List authenticated identity conversations
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: beforeConversationId
          schema:
            type: string
      responses:
        '200':
          description: Authenticated identity conversations page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationsResource'
  /conversations/{conversationId}/messages:
    post:
      tags:
        - conversations
      summary: Send encrypted message to conversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostConversationMessageBody'
      responses:
        '200':
          description: Message accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResource'
    get:
      tags:
        - conversations
      summary: Get latest conversation messages
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: beforeMessageId
          schema:
            type: string
      responses:
        '200':
          description: Latest messages page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesResource'
  /conversations/{conversationId}/messages/read-until:
    put:
      tags:
        - conversations
      summary: Mark conversation messages as read up to a message
      description: Deletes local unread flags for the authenticated identity up to and including the given message id, then publishes a read event so other nodes can apply the same projection update.
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutConversationMessagesReadUntilBody'
      responses:
        '200':
          description: Messages marked as read.
  /conversations/{conversationId}/messages/{messageId}:
    get:
      tags:
        - conversations
      summary: Get one conversation message by id
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Conversation message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResource'
    delete:
      tags:
        - conversations
      summary: Delete conversation message
      description: Creates a signed deleted-message tombstone, publishes a deletion event, invalidates the target message locally and removes the local IPFS block when present. The deletion signature must use previousMessageIds with only the target message id.
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteConversationMessageBody'
      responses:
        '200':
          description: Message deletion accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResource'
  /conversations/{conversationId}/messages/{messageId}/reactions:
    post:
      tags:
        - conversations
      summary: React to a conversation message
      description: Stores a message reaction in MongoDB only and publishes a realtime/sync event to the other conversation participants.
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationMessageReactionBody'
      responses:
        '200':
          description: Reaction stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageReactionResource'
    delete:
      tags:
        - conversations
      summary: Remove a conversation message reaction
      description: Removes the authenticated participant reaction from MongoDB and publishes a realtime/sync event to the other conversation participants.
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationMessageReactionBody'
      responses:
        '200':
          description: Reaction removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageReactionResource'
  /conversations/{conversationId}/messages/{messageId}/around:
    get:
      tags:
        - conversations
      summary: Get conversation messages around one message
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
        - in: query
          name: before
          schema:
            type: integer
            default: 20
        - in: query
          name: after
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Message window around the requested message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesAroundResource'
components:
  parameters:
    ConversationId:
      in: path
      name: conversationId
      required: true
      schema:
        type: string
    XIdentityId:
      in: header
      name: X-Identity-Id
      required: true
      schema:
        type: string
    XTimestamp:
      in: header
      name: X-Timestamp
      required: true
      schema:
        type: string
    XNonce:
      in: header
      name: X-Nonce
      required: true
      schema:
        type: string
    XSignature:
      in: header
      name: X-Signature
      required: true
      schema:
        type: string
  schemas:
    PostConversationBody:
      type: object
      required:
        - type
        - participantIds
        - keychainExternalIdentifier
        - networkId
      properties:
        type:
          type: string
          enum:
            - group
            - one-to-one
        name:
          type: string
          description: Required when type is group. Standalone group conversation name.
        participantIds:
          type: array
          minItems: 2
          items:
            type: string
        keychainExternalIdentifier:
          type: string
        networkId:
          type: string
          format: uuid
    ConversationResource:
      type: object
      required:
        - id
        - networkId
        - participantIds
        - type
        - unreadCount
      properties:
        id:
          type: string
          example: one-to-one:3bd1...
        name:
          type: string
          description: Present for standalone group conversations.
        networkId:
          type: string
          format: uuid
        participantIds:
          type: array
          items:
            type: string
        type:
          type: string
          enum:
            - group
            - one-to-one
        unreadCount:
          type: integer
          minimum: 0
    ConversationsResource:
      type: object
      required:
        - conversations
      properties:
        conversations:
          type: array
          items:
            $ref: '#/components/schemas/ConversationResource'
        nextBeforeConversationId:
          type: string
    PostConversationMessageBody:
      type: object
      required:
        - id
        - createdAt
        - encryptedPayload
        - signature
      properties:
        id:
          type: string
        createdAt:
          type: integer
        encryptedPayload:
          type: string
        signature:
          type: string
          description: Signature of the sent-message canonical payload. Include previousMessageIds and replyToMessageId in the signed payload when present.
        previousMessageIds:
          type: array
          description: Optional previous message ids used by the client to sign the message. When included in the signed payload, send the exact same array in the body. When omitted, the node uses an empty list.
          items:
            type: string
        replyToMessageId:
          type: string
          description: Optional id of the existing sent message this message replies to.
        attachmentExternalIdentifiers:
          type: array
          items:
            type: string
    DeleteConversationMessageBody:
      type: object
      required:
        - id
        - createdAt
        - signature
      properties:
        id:
          type: string
          description: Client-generated id for the deleted-message tombstone.
        createdAt:
          type: integer
        signature:
          type: string
          description: Signature of the deleted-message canonical payload, using previousMessageIds equal to the path messageId.
    PutConversationMessagesReadUntilBody:
      type: object
      required:
        - messageId
      properties:
        messageId:
          type: string
          description: Message id up to and including which unread flags should be removed for the authenticated identity.
    ConversationMessageReactionBody:
      type: object
      required:
        - emoji
      properties:
        emoji:
          type: string
          description: Emoji reaction to add or remove. Reactions are unique by conversation, message, author and emoji.
          example: 👍
    MessageReactionResource:
      type: object
      required:
        - authorIdentityId
        - createdAt
        - emoji
      properties:
        authorIdentityId:
          type: string
        createdAt:
          type: integer
        emoji:
          type: string
    MessageResource:
      type: object
      required:
        - id
        - conversationId
        - authorIdentityId
        - type
        - createdAt
        - previousMessageIds
        - attachmentExternalIdentifiers
      properties:
        id:
          type: string
        conversationId:
          type: string
        authorIdentityId:
          type: string
        type:
          type: string
        createdAt:
          type: integer
        encryptedPayload:
          type: string
        previousMessageIds:
          type: array
          items:
            type: string
        reactions:
          type: array
          description: MongoDB-only reactions synchronized by conversation events.
          items:
            $ref: '#/components/schemas/MessageReactionResource'
        replyToMessageId:
          type: string
        attachmentExternalIdentifiers:
          type: array
          items:
            type: string
        targetMessageId:
          type: string
    MessagesResource:
      type: object
      required:
        - conversationId
        - messages
      properties:
        conversationId:
          type: string
        messages:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/MessageResource'
              - $ref: '#/components/schemas/ConversationCallEventResource'
              - $ref: '../polls-api/swagger.yaml#/components/schemas/Poll'
        nextBeforeMessageId:
          type: string
    ConversationCallEventResource:
      type: object
      required:
        - id
        - conversationId
        - type
        - callId
        - callEventType
        - actorIdentityId
        - createdAt
        - durationMs
      properties:
        id:
          type: string
        conversationId:
          type: string
        type:
          type: string
          enum:
            - call_event
        callId:
          type: string
        callEventType:
          type: string
          enum:
            - declined
            - ended
            - missed
        actorIdentityId:
          type: string
        createdAt:
          type: integer
        durationMs:
          type: integer
    MessagesAroundResource:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageResource'
        previousCursor:
          type: string
        nextCursor:
          type: string
