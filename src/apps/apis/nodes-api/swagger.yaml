openapi: 3.0.3
info:
  title: Pigeon-swarm Nodes API
  version: 1.0.0
  description: Endpoints for reading and managing the local node.
tags:
  - name: nodes
paths:
  /node/:
    get:
      tags:
        - nodes
      summary: Get local node information
      responses:
        '200':
          description: Local node information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResource'
  /node/networks/:
    get:
      tags:
        - nodes
      summary: Get local node networks
      description: Private network keys are returned only when X-Identity-Id matches the current node owner.
      parameters:
        - $ref: '#/components/parameters/XOptionalIdentityId'
      responses:
        '200':
          description: Local node networks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
    post:
      tags:
        - nodes
      summary: Add local node network
      description: Unsigned while the node has no owner; signed by the owner once claimed.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostNodeNetworkBody'
      responses:
        '200':
          description: Network added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
        '403':
          description: The authenticated identity is not the node owner.
  /node/networks/{networkId}/:
    delete:
      tags:
        - nodes
      summary: Delete local node network
      description: Removes the network from the local node, stops and deletes its local IPFS storage, and removes local MongoDB data scoped only to that network. Identity metadata that also belongs to other networks is kept and only loses the removed network id. Unsigned while the node has no owner; signed by the owner once claimed.
      parameters:
        - in: path
          name: networkId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Network deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
        '403':
          description: The authenticated identity is not the node owner.
        '409':
          description: The network does not exist in the local node.
  /node/networks/public/:
    post:
      tags:
        - nodes
      summary: Add generated public node network
      description: Creates a public network with a backend-generated network id and the fixed name `public`. Unsigned while the node has no owner; signed by the owner once claimed. A node can only have one public network.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Public network added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
        '403':
          description: The authenticated identity is not the node owner.
        '409':
          description: The node already has a public network.
  /node/owner/:
    put:
      tags:
        - nodes
      summary: Put local node owner
      description: Claims an unowned node, or changes the owner when signed by the current owner.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutNodeOwnerBody'
      responses:
        '200':
          description: Node owner set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResource'
        '409':
          description: The current owner did not sign the request.
  /peers/:
    get:
      tags:
        - nodes
      summary: Get active peers
      description: Returns nodes seen through heartbeat events during the active peer window. Network private keys are never included.
      responses:
        '200':
          description: Active peers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeersResource'
components:
  parameters:
    XIdentityId:
      in: header
      name: X-Identity-Id
      required: true
      schema:
        type: string
    XOptionalIdentityId:
      in: header
      name: X-Identity-Id
      required: false
      schema:
        type: string
      description: Optional identity used to decide whether private network keys can be included in GET /node/networks/. Only the node owner receives keys.
    XTimestamp:
      in: header
      name: X-Timestamp
      required: true
      schema:
        type: string
    XNonce:
      in: header
      name: X-Nonce
      required: true
      schema:
        type: string
    XSignature:
      in: header
      name: X-Signature
      required: true
      schema:
        type: string
  schemas:
    NodeResource:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        owner:
          type: string
    NetworkResource:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Present only when the caller identity in X-Identity-Id is the node owner, or when returned by owner-only write operations.
    NetworksResource:
      type: object
      required:
        - networks
      properties:
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkResource'
    PeerResource:
      type: object
      required:
        - id
        - lastSeenAt
        - networks
      properties:
        id:
          type: string
        owner:
          type: string
        lastSeenAt:
          type: number
        networks:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: string
              name:
                type: string
    PeersResource:
      type: object
      required:
        - peers
      properties:
        peers:
          type: array
          items:
            $ref: '#/components/schemas/PeerResource'
    PostNodeNetworkBody:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Optional private network key to register a private IPFS network.
    PutNodeOwnerBody:
      type: object
      properties:
        identityId:
          type: string
