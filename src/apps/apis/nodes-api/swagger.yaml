openapi: 3.0.3
info:
  title: Pigeon-swarm Nodes API
  version: 1.0.0
  description: Endpoints for reading and managing the local node.
tags:
  - name: nodes
paths:
  /node/:
    get:
      tags:
        - nodes
      summary: Get local node information
      responses:
        '200':
          description: Local node information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResource'
  /node/relay-configuration/:
    get:
      tags:
        - nodes
      summary: Get local node relay configuration
      description: Returns relay settings owned by the local node. Requires a signed request from the current node owner.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Local node relay configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRelayConfigurationResource'
        '403':
          description: The authenticated identity is not the node owner.
    put:
      tags:
        - nodes
      summary: Replace local node relay configuration
      description: Configures public relay advertising, public relay discovery, private relay ports, private relay record publication/discovery, public host, and manual relay multiaddrs. Requires a signed request from the current node owner.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeRelayConfigurationResource'
      responses:
        '200':
          description: Relay configuration replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRelayConfigurationResource'
        '403':
          description: The authenticated identity is not the node owner.
        '409':
          description: The relay configuration is invalid.
  /node/networks/:
    get:
      tags:
        - nodes
      summary: Get local node networks
      description: Private network keys are returned only when the request is signed by the current node owner. Unsigned, malformed, or non-owner requests still receive networks without private keys.
      parameters:
        - $ref: '#/components/parameters/XOptionalIdentityId'
        - $ref: '#/components/parameters/XOptionalTimestamp'
        - $ref: '#/components/parameters/XOptionalSignature'
      responses:
        '200':
          description: Local node networks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
    post:
      tags:
        - nodes
      summary: Add local node network
      description: Unsigned while the node has no owner; signed by the owner once claimed.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostNodeNetworkBody'
      responses:
        '200':
          description: Network added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
        '403':
          description: The authenticated identity is not the node owner.
  /node/networks/{networkId}/:
    delete:
      tags:
        - nodes
      summary: Delete local node network
      description: Removes the network from the local node, stops and deletes its local IPFS storage, and removes local and replicated data scoped only to that network. Identity metadata that also belongs to other networks is kept and only loses the removed network id. Requires a signed request from the node owner; unowned nodes reject deletion because no owner can authorize the destructive operation.
      parameters:
        - in: path
          name: networkId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Network deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
        '403':
          description: The authenticated identity is not the node owner.
        '409':
          description: The network does not exist in the local node.
  /node/networks/public/:
    post:
      tags:
        - nodes
      summary: Add generated public node network
      description: Creates a public network with a backend-generated network id and the fixed name `public`. Unsigned while the node has no owner; signed by the owner once claimed. A node can only have one public network.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Public network added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResource'
        '403':
          description: The authenticated identity is not the node owner.
        '409':
          description: The node already has a public network.
  /node/owner/:
    put:
      tags:
        - nodes
      summary: Put local node owner
      description: Claims an unowned node, or changes the owner when signed by the current owner.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutNodeOwnerBody'
      responses:
        '200':
          description: Node owner set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResource'
        '409':
          description: The current owner did not sign the request.
  /peers/:
    get:
      tags:
        - nodes
      summary: Get active peers
      description: Returns nodes seen through heartbeat events during the active peer window plus live IPFS transport peers currently connected through libp2p. Network private keys are never included.
      responses:
        '200':
          description: Active peers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeersResource'
components:
  parameters:
    XIdentityId:
      in: header
      name: X-Identity-Id
      required: true
      schema:
        type: string
    XOptionalIdentityId:
      in: header
      name: X-Identity-Id
      required: false
      schema:
        type: string
      description: Optional identity used with a valid request signature to decide whether private network keys can be included in GET /node/networks/. Only the signed node owner receives keys.
    XOptionalTimestamp:
      in: header
      name: X-Timestamp
      required: false
      schema:
        type: string
    XOptionalSignature:
      in: header
      name: X-Signature
      required: false
      schema:
        type: string
    XTimestamp:
      in: header
      name: X-Timestamp
      required: true
      schema:
        type: string
    XSignature:
      in: header
      name: X-Signature
      required: true
      schema:
        type: string
  schemas:
    NodeResource:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        owner:
          type: string
    NetworkResource:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Present only when the caller identity in X-Identity-Id is the node owner, or when returned by owner-only write operations.
    NetworksResource:
      type: object
      required:
        - networks
      properties:
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkResource'
    NodePrivateRelayConfigurationResource:
      type: object
      required:
        - discoveryEnabled
        - enabled
        - publicationEnabled
      properties:
        discoveryEnabled:
          type: boolean
          description: Allows private networks to discover published private relay records.
        enabled:
          type: boolean
        portStart:
          type: number
          description: Required when enabled is true.
        portEnd:
          type: number
          description: Required when enabled is true.
        publicationEnabled:
          type: boolean
          description: Allows the private relay server to publish encrypted private relay records.
    NodeCallsRelayConfigurationResource:
      type: object
      properties:
        port:
          type: number
          description: TURN listening port used to derive local call relay URLs from publicHost.
    NodePublicNetworkConfigurationResource:
      type: object
      required:
        - enabled
        - port
      properties:
        enabled:
          type: boolean
          description: Enables a stable public libp2p endpoint for this node.
        port:
          type: number
          description: Public libp2p TCP port announced with publicHost when enabled.
    NodeRelayConfigurationResource:
      type: object
      required:
        - callsRelay
        - manualRelayMultiaddrs
        - privateRelay
        - publicNetwork
      properties:
        callsRelay:
          $ref: '#/components/schemas/NodeCallsRelayConfigurationResource'
        manualRelayMultiaddrs:
          type: array
          items:
            type: string
          description: Full libp2p multiaddrs manually configured as relay/bootstrap fallbacks.
        privateRelay:
          $ref: '#/components/schemas/NodePrivateRelayConfigurationResource'
        publicHost:
          type: string
          description: DNS name or IPv4 address used when announcing public network, private relay and call relay addresses.
        publicNetwork:
          $ref: '#/components/schemas/NodePublicNetworkConfigurationResource'
    PeerResource:
      type: object
      required:
        - id
        - lastSeenAt
        - networks
      properties:
        capabilities:
          $ref: '#/components/schemas/PeerCapabilitiesResource'
        connectionSummary:
          $ref: '#/components/schemas/PeerConnectionSummaryResource'
        id:
          type: string
        owner:
          type: string
        lastSeenAt:
          type: number
        networks:
          type: array
          items:
            $ref: '#/components/schemas/PeerNetworkResource'
        nodeType:
          type: string
          enum:
            - leaf
            - reachable
            - relay
            - unknown
    PeerCapabilitiesResource:
      type: object
      required:
        - privateIpfs
        - publicIpfs
        - relay
      properties:
        privateIpfs:
          type: boolean
        publicIpfs:
          type: boolean
        relay:
          type: boolean
    PeerConnectionSummaryResource:
      type: object
      required:
        - isSharedNetworkPeer
        - sharedNetworkCount
      properties:
        isSharedNetworkPeer:
          type: boolean
        sharedNetworkCount:
          type: number
    PeerNetworkResource:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
    ConnectedIpfsPeerNetworkResource:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - private
            - public
    ConnectedIpfsPeerResource:
      type: object
      required:
        - id
        - networks
      properties:
        id:
          type: string
          description: Connected libp2p peer id. This is not necessarily the node id because the peer may not have sent a node heartbeat yet.
        networks:
          type: array
          items:
            $ref: '#/components/schemas/ConnectedIpfsPeerNetworkResource'
    PeersResource:
      type: object
      required:
        - ipfsPeers
        - peers
      properties:
        ipfsPeers:
          type: array
          description: Live IPFS transport peers grouped by connected network.
          items:
            $ref: '#/components/schemas/ConnectedIpfsPeerResource'
        peers:
          type: array
          items:
            $ref: '#/components/schemas/PeerResource'
    PostNodeNetworkBody:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Optional private network key to register a private IPFS network.
    PutNodeOwnerBody:
      type: object
      properties:
        identityId:
          type: string
