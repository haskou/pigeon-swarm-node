paths:
  /ws:
    get:
      tags:
        - realtime
      summary: Open a signed WebSocket realtime connection
      description: |
        WebSocket upgrade endpoint for realtime domain events.

        Browser clients authenticate with query parameters because custom
        WebSocket headers are not available in browsers. Non-browser clients may
        send the same credentials as headers.

        The signed canonical request is `GET /ws` with an empty body `{}`. When
        `ROUTE_PREFIX` is configured, sign the prefixed path, for example
        `GET /api/ws`.

        On success the server sends:

        `{ "type": "connection_ack", "identityId": "<normalizedIdentityId>" }`

        Clients may send `{ "type": "identity_heartbeat" }` over the open
        socket. The server answers
        `{ "type": "heartbeat_ack", "identityId": "<normalizedIdentityId>", "timestamp": 1770000000000 }`.
        Heartbeat messages are not signed because the WebSocket upgrade already
        authenticated the connection.

        Subsequent messages use:

        `{ "type": "domain_event", "event": { "type": "<eventType>", "aggregate_id": "<aggregateId>", "attributes": {} } }`
      parameters:
        - in: query
          name: identityId
          required: false
          schema:
            type: string
          description: Identity id/public key without PEM wrapping. Browser auth parameter equivalent to `X-Identity-Id`.
        - in: query
          name: timestamp
          required: false
          schema:
            type: string
          description: Millisecond timestamp. Browser auth parameter equivalent to `X-Timestamp`.
        - in: query
          name: nonce
          required: false
          schema:
            type: string
          description: One-time nonce. Browser auth parameter equivalent to `X-Nonce`.
        - in: query
          name: signature
          required: false
          schema:
            type: string
          description: Signature over the canonical signed request. Browser auth parameter equivalent to `X-Signature`.
        - in: header
          name: X-Identity-Id
          required: false
          schema:
            type: string
        - in: header
          name: X-Timestamp
          required: false
          schema:
            type: string
        - in: header
          name: X-Nonce
          required: false
          schema:
            type: string
        - in: header
          name: X-Signature
          required: false
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade accepted.
        '401':
          description: Signed WebSocket handshake is missing, stale, replayed, or invalid.
