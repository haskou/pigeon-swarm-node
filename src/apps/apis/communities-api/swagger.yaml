openapi: 3.0.3
info:
  title: Pigeon-swarm Communities API
  version: 1.0.0
  description: Endpoints for private/public communities, members, text channels, and channel messages.
tags:
  - name: communities
paths:
  /communities/:
    get:
      tags:
        - communities
      summary: List communities for the authenticated member
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Communities where the authenticated identity is a member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunitiesResource'
    post:
      tags:
        - communities
      summary: Create a community
      description: The authenticated identity becomes the owner and first member. visibility defaults to private and cannot be changed later. Private communities require encrypted channel message payloads. Public communities require plaintext channel message payloads so messages can be indexed and searched.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCommunityBody'
      responses:
        '200':
          description: Community created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
  /communities/discover:
    get:
      tags:
        - communities
      summary: Discover communities by public metadata
      description: Returns searchable community metadata without exposing channels or private message content. Hidden communities with discoverable=false are excluded. The authenticated identity receives its current membership state for each result.
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
        - in: query
          name: networkId
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Discoverable communities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityDiscoveryResource'
  /communities/membership-requests:
    get:
      tags:
        - communities
      summary: List community invitations and join requests
      description: Returns requests created by the authenticated identity, targeting the authenticated identity, or belonging to communities owned by the authenticated identity.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Community membership requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMembershipRequestsResource'
  /communities/membership-requests/{requestId}:
    patch:
      tags:
        - communities
      summary: Accept or decline a community invitation or join request
      description: Invited identities can accept or decline invitations. Community owners or members with approve/reject member permissions can accept or decline join requests. Accepted requests add the target identity to memberIds.
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCommunityMembershipRequestBody'
      responses:
        '200':
          description: Membership request updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMembershipRequestResource'
  /communities/{communityId}:
    get:
      tags:
        - communities
      summary: Get a private community
      description: Only community members can read the community.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Community found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Authenticated identity is not a community member.
    patch:
      tags:
        - communities
      summary: Update private community profile
      description: Only the community owner can update the name, description, or banner CID.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCommunityBody'
      responses:
        '200':
          description: Community updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Authenticated identity is not the community owner.
  /communities/{communityId}/moderation-logs:
    get:
      tags:
        - communities
      summary: List community moderation log entries
      description: Requires manage_members. Returns OrbitDB replicated audit entries for administrative actions such as role changes, channel changes, invitations, membership decisions, bans, and moderated message deletes.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: beforeLogId
          schema:
            type: string
          description: Cursor returned as nextBeforeLogId.
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Moderation log entries ordered from newest to oldest.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityModerationLogsResource'
        '409':
          description: Authenticated identity does not have manage_members.
  /communities/{communityId}/members:
    get:
      tags:
        - communities
      summary: List private community members
      description: Only community members can list members.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Community members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMembersResource'
    post:
      tags:
        - communities
      summary: Invite an identity to a private community
      description: Only the community owner or members with create_invites can create direct membership invitations. The invited identity is not added to memberIds until they accept the invitation.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCommunityMemberBody'
      responses:
        '200':
          description: Pending invitation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMembershipRequestResource'
        '409':
          description: Authenticated identity does not have create_invites.
  /communities/{communityId}/members/{identityId}/roles:
    put:
      tags:
        - communities
      summary: Replace roles assigned to a community member
      description: Only the owner or members with manage_roles can assign roles. The built-in everyone role is implicit and does not need to be assigned.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: identityId
          required: true
          schema:
            type: string
          description: URL-encoded identity id.
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutCommunityMemberRolesBody'
      responses:
        '200':
          description: Member roles replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Authenticated identity does not have manage_roles.
  /communities/{communityId}/bans:
    post:
      tags:
        - communities
      summary: Ban an identity from a community
      description: Requires ban_members. Banned identities cannot request to join or accept invite links.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCommunityBanBody'
      responses:
        '200':
          description: Identity banned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
  /communities/{communityId}/bans/{identityId}:
    delete:
      tags:
        - communities
      summary: Remove a community ban
      description: Requires ban_members.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: identityId
          required: true
          schema:
            type: string
          description: URL-encoded identity id.
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Ban removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
  /communities/{communityId}/roles:
    get:
      tags:
        - communities
      summary: List community roles and member assignments
      description: Only community members can list roles.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Community roles and member role assignments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityRolesResource'
    post:
      tags:
        - communities
      summary: Create a community role
      description: Only the owner or members with manage_roles can create roles.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityRoleBody'
      responses:
        '200':
          description: Role created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityRoleResource'
        '409':
          description: Authenticated identity does not have manage_roles.
  /communities/{communityId}/roles/{roleId}:
    patch:
      tags:
        - communities
      summary: Update a community role
      description: Only the owner or members with manage_roles can update roles.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: roleId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityRoleBody'
      responses:
        '200':
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
    delete:
      tags:
        - communities
      summary: Delete a community role
      description: Only the owner or members with manage_roles can delete custom roles. Built-in roles cannot be deleted.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: roleId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Role deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
  /communities/{communityId}/members/me:
    delete:
      tags:
        - communities
      summary: Leave a private community
      description: The authenticated member leaves the community. The owner cannot leave until ownership transfer or community deletion exists.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Member removed from the community.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Authenticated identity is not a community member or is the community owner.
  /communities/{communityId}/members/{identityId}/kick:
    delete:
      tags:
        - communities
      summary: Kick a member from a private community
      description: Requires the community owner or a member with manage_members. This removes the target from memberIds but does not ban them.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: identityId
          required: true
          schema:
            type: string
          description: URL-encoded identity id to remove.
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Member removed from the community.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Authenticated identity cannot manage members, target is not a member, or target is the owner.
  /communities/{communityId}/invites:
    post:
      tags:
        - communities
      summary: Create a private community invite link token
      description: Only the community owner or a member with create_invites can create invite link tokens. The token is bearer-style; anyone with a valid token can accept it with their signed identity. The optional encryptedCommunityKey is an opaque client-encrypted blob. The backend stores and returns it but never receives the fragment secret or a clear community key.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCommunityInviteBody'
      responses:
        '200':
          description: Invite token created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityInviteResource'
        '409':
          description: Authenticated identity is not the community owner or the invite body is invalid.
  /communities/invites/{inviteToken}:
    get:
      tags:
        - communities
      summary: Read a private community invite link token
      description: Returns public community metadata and the opaque encryptedCommunityKey blob needed by frontend invite links. This endpoint is intentionally unsigned so users without an identity can preview/create an account before accepting. The invite token remains a bearer secret.
      parameters:
        - in: path
          name: inviteToken
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityInviteDetailsResource'
        '409':
          description: Invite token was not found.
  /communities/{communityId}/join-requests:
    post:
      tags:
        - communities
      summary: Request to join a private community
      description: Creates a pending join request when autoJoinEnabled is false. If autoJoinEnabled is true, the request is immediately accepted and the requester is added to memberIds.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Pending or auto-accepted join request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMembershipRequestResource'
  /communities/invites/{inviteToken}/accept:
    post:
      tags:
        - communities
      summary: Accept a private community invite link token
      description: The authenticated identity consumes the bearer invite token and joins the linked community. The backend does not receive or decrypt community keys.
      parameters:
        - in: path
          name: inviteToken
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Invite accepted and community updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Invite token was not found, expired, or has no uses left.
  /communities/{communityId}/channels:
    get:
      tags:
        - communities
      summary: List private community channels
      description: Only community members can list text and voice channel metadata. Channels hidden from the authenticated member by role visibility are omitted.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Community channels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelsResource'
  /communities/{communityId}/channels/text:
    post:
      tags:
        - communities
      summary: Create a private community text channel
      description: Requires manage_channels.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCommunityTextChannelBody'
      responses:
        '200':
          description: Text channel created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityTextChannelResource'
        '409':
          description: Authenticated identity does not have manage_channels.
  /communities/{communityId}/channels/voice:
    post:
      tags:
        - communities
      summary: Create a private community voice channel
      description: Requires manage_channels. Voice channel presence is derived from active calls scoped to that channel.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCommunityVoiceChannelBody'
      responses:
        '200':
          description: Voice channel created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityVoiceChannelResource'
        '409':
          description: Authenticated identity does not have manage_channels.
  /communities/{communityId}/channels/{channelId}:
    patch:
      tags:
        - communities
      summary: Rename a private community text channel
      description: Requires manage_channels.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCommunityChannelBody'
      responses:
        '200':
          description: Channel renamed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Authenticated identity does not have manage_channels or the channel does not exist.
    delete:
      tags:
        - communities
      summary: Delete a private community channel
      description: Requires manage_channels. Deleting a text channel also deletes its stored channel messages.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Channel deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
        '409':
          description: Authenticated identity does not have manage_channels or the channel does not exist.
  /communities/{communityId}/channels/{channelId}/permissions:
    patch:
      tags:
        - communities
      summary: Update channel role visibility
      description: Requires manage_channels. A channel is visible to members that have at least one role listed in visibleRoleIds. Use everyone for all members.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCommunityChannelPermissionsBody'
      responses:
        '200':
          description: Channel visibility updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityResource'
  /communities/me/drafts:
    get:
      tags:
        - communities
      summary: List authenticated identity community channel drafts
      description: Drafts are local embedded DB opaque encrypted payloads owned by the authenticated identity.
      parameters:
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Community channel drafts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelDraftsResource'
  /communities/{communityId}/channels/{channelId}/draft:
    put:
      tags:
        - communities
      summary: Save authenticated identity draft for a community text channel
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityChannelDraftBody'
      responses:
        '200':
          description: Draft saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelDraftResource'
    delete:
      tags:
        - communities
      summary: Delete authenticated identity draft for a community text channel
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Draft deleted.
  /communities/{communityId}/channels/{channelId}/pins:
    get:
      tags:
        - communities
      summary: List pinned messages for a community text channel
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Community channel pinned messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessagePinsResource'
  /communities/{communityId}/channels/{channelId}/messages:
    get:
      tags:
        - communities
      summary: List community text channel messages
      description: Only community members can read text channel messages. Private community messages expose encryptedPayload. Public community messages expose plaintextPayload. Voice-channel call lifecycle is exposed through calls/channel presence, not this text timeline.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: beforeMessageId
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Channel timeline items ordered from oldest to newest in the page. Community channel poll ids are valid channel message ids and can be used as beforeMessageId.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessagesResource'
        '409':
          description: Authenticated identity is not a member or the channel does not exist.
    post:
      tags:
        - communities
      summary: Send a community text channel message
      description: Only community members can send channel messages. Private communities require encryptedPayload and public communities require plaintextPayload. The backend validates the message signature.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCommunityChannelMessageBody'
      responses:
        '200':
          description: Message stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessageResource'
        '409':
          description: Authenticated identity is not a member, the channel does not exist, or the message signature is invalid.
  /communities/{communityId}/messages/search:
    get:
      tags:
        - communities
      summary: Search public community messages across visible text channels
      description: Only public community plaintext messages are searchable. Results are limited to text channels visible to the authenticated member. The request is signed as GET /communities/{communityId}/messages/search; query string values are not part of the signed path.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Matching public messages from visible text channels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMessageSearchResource'
        '409':
          description: The community is private or the authenticated identity is not a member.
  /communities/{communityId}/channels/{channelId}/messages/search:
    get:
      tags:
        - communities
      summary: Search public community text channel messages
      description: Only public community plaintext messages are searchable. The request is signed as GET /communities/{communityId}/channels/{channelId}/messages/search; query string values are not part of the signed path.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Matching public channel messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessagesResource'
        '409':
          description: The community is private, the authenticated identity is not a member, or the channel does not exist.
  /communities/{communityId}/channels/{channelId}/messages/{messageId}:
    put:
      tags:
        - communities
      summary: Edit a community text channel message
      description: Only the original author can edit a channel message. Private communities require encryptedPayload and public communities require plaintextPayload. The backend validates the edition signature and announces the change through realtime and pubsub events.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutCommunityChannelMessageBody'
      responses:
        '200':
          description: Message edited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessageResource'
        '409':
          description: Authenticated identity is not the author, the channel does not exist, or the edition signature is invalid.
    delete:
      tags:
        - communities
      summary: Delete an encrypted private community text channel message
      description: Only community members can delete channel messages. The deletion is announced through realtime and pubsub events.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCommunityChannelMessageBody'
      responses:
        '200':
          description: Message deleted locally.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedCommunityChannelMessageResource'
        '409':
          description: Authenticated identity is not a member, the channel does not exist, or the deletion signature is invalid.
  /communities/{communityId}/channels/{channelId}/messages/{messageId}/pin:
    post:
      tags:
        - communities
      summary: Pin a community text channel message
      description: Requires manage_messages for the community channel.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Message pinned.
    delete:
      tags:
        - communities
      summary: Unpin a community text channel message
      description: Requires manage_messages for the community channel.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Message unpinned.
  /communities/{communityId}/channels/{channelId}/messages/{messageId}/thread:
    get:
      tags:
        - communities
      summary: Get replies for a community channel message thread
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      responses:
        '200':
          description: Messages whose replyToMessageId points to the requested message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessagesResource'
  /communities/{communityId}/channels/{channelId}/messages/{messageId}/reactions:
    post:
      tags:
        - communities
      summary: Add a reaction to a private community text channel message
      description: Reactions are OrbitDB replicated metadata synchronized by community events. The encrypted message document is not rewritten.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityChannelMessageReactionBody'
      responses:
        '200':
          description: Reaction stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessageReactionResource'
        '409':
          description: Authenticated identity is not a member, the channel does not exist, or the message does not exist.
    delete:
      tags:
        - communities
      summary: Remove a reaction from a private community text channel message
      description: Removes the authenticated member reaction for the provided emoji.
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - in: path
          name: channelId
          required: true
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XIdentityId'
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XNonce'
        - $ref: '#/components/parameters/XSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityChannelMessageReactionBody'
      responses:
        '200':
          description: Reaction removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityChannelMessageReactionResource'
        '409':
          description: Authenticated identity is not a member, the channel does not exist, or the message does not exist.
components:
  parameters:
    CommunityId:
      in: path
      name: communityId
      required: true
      schema:
        type: string
    XIdentityId:
      in: header
      name: X-Identity-Id
      required: true
      schema:
        type: string
    XTimestamp:
      in: header
      name: X-Timestamp
      required: true
      schema:
        type: string
    XNonce:
      in: header
      name: X-Nonce
      required: true
      schema:
        type: string
    XSignature:
      in: header
      name: X-Signature
      required: true
      schema:
        type: string
  schemas:
    CommunityTextChannelResource:
      type: object
      required:
        - id
        - name
        - type
        - createdAt
        - permissions
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - text
        createdAt:
          type: integer
        permissions:
          $ref: '#/components/schemas/CommunityChannelPermissionsResource'
        threads:
          type: array
          description: Recent active threads for this text channel, newest activity first.
          items:
            $ref: '#/components/schemas/CommunityChannelThreadSummaryResource'
    CommunityChannelThreadSummaryResource:
      type: object
      required:
        - rootMessageId
        - replyCount
        - lastReplyAt
        - lastReplyMessageId
      properties:
        rootMessageId:
          type: string
        replyCount:
          type: integer
        lastReplyAt:
          type: integer
        lastReplyMessageId:
          type: string
    CommunityVoiceChannelResource:
      type: object
      required:
        - id
        - name
        - type
        - createdAt
        - connectedIdentityIds
        - permissions
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - voice
        createdAt:
          type: integer
        permissions:
          $ref: '#/components/schemas/CommunityChannelPermissionsResource'
        connectedIdentityIds:
          type: array
          description: Identities currently joined to the active call for this voice channel.
          items:
            type: string
    CommunityResource:
      type: object
      required:
        - id
        - networkId
        - ownerIdentityId
        - name
        - description
        - memberIds
        - bannedMemberIds
        - memberRoles
        - roles
        - textChannels
        - voiceChannels
        - visibility
        - discoverable
        - autoJoinEnabled
        - createdAt
      properties:
        id:
          type: string
        networkId:
          type: string
        ownerIdentityId:
          type: string
        name:
          type: string
        description:
          type: string
        discoverable:
          type: boolean
          description: Whether this private community appears in discovery search results.
        autoJoinEnabled:
          type: boolean
          description: Whether non-banned identities can join without owner approval.
        avatar:
          type: string
          description: Public IPFS CID for the community avatar/icon.
        banner:
          type: string
          description: Public IPFS CID for the community banner.
        memberIds:
          type: array
          items:
            type: string
        bannedMemberIds:
          type: array
          items:
            type: string
        memberRoles:
          type: array
          items:
            $ref: '#/components/schemas/CommunityMemberRolesResource'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/CommunityRoleResource'
        textChannels:
          type: array
          items:
            $ref: '#/components/schemas/CommunityTextChannelResource'
        voiceChannels:
          type: array
          items:
            $ref: '#/components/schemas/CommunityVoiceChannelResource'
        visibility:
          type: string
          enum:
            - private
            - public
        createdAt:
          type: integer
    CommunitiesResource:
      type: object
      required:
        - communities
      properties:
        communities:
          type: array
          items:
            $ref: '#/components/schemas/CommunityResource'
    CommunityModerationLogsResource:
      type: object
      required:
        - logs
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/CommunityModerationLogResource'
        nextBeforeLogId:
          type: string
    CommunityModerationLogResource:
      type: object
      required:
        - id
        - communityId
        - actorIdentityId
        - action
        - target
        - details
        - createdAt
      properties:
        id:
          type: string
        communityId:
          type: string
        actorIdentityId:
          type: string
        action:
          $ref: '#/components/schemas/CommunityModerationAction'
        target:
          $ref: '#/components/schemas/CommunityModerationTargetResource'
        details:
          type: object
          additionalProperties: true
        createdAt:
          type: integer
    CommunityModerationTargetResource:
      type: object
      required:
        - type
        - id
      properties:
        type:
          type: string
          enum:
            - channel
            - community
            - invite
            - member
            - membership_request
            - message
            - role
        id:
          type: string
    CommunityModerationAction:
      type: string
      enum:
        - channel_created
        - channel_deleted
        - channel_permissions_updated
        - channel_renamed
        - community_updated
        - invitation_created
        - invite_link_created
        - member_banned
        - member_roles_updated
        - member_unbanned
        - membership_request_accepted
        - membership_request_declined
        - message_deleted
        - role_created
        - role_deleted
        - role_updated
    CommunityDiscoveryResource:
      type: object
      required:
        - communities
      properties:
        communities:
          type: array
          items:
            $ref: '#/components/schemas/CommunityDiscoveryItemResource'
    CommunityDiscoveryItemResource:
      type: object
      required:
        - id
        - networkId
        - ownerIdentityId
        - name
        - description
        - memberCount
        - membershipStatus
        - visibility
        - discoverable
        - autoJoinEnabled
      properties:
        id:
          type: string
        networkId:
          type: string
        ownerIdentityId:
          type: string
        name:
          type: string
        description:
          type: string
        discoverable:
          type: boolean
          enum:
            - true
          description: Discovery only returns communities where this flag is true.
        autoJoinEnabled:
          type: boolean
          description: Whether the community accepts join requests immediately.
        avatar:
          type: string
        banner:
          type: string
        memberCount:
          type: integer
        membershipStatus:
          type: string
          enum:
            - invited
            - member
            - none
            - requested
        membershipRequest:
          $ref: '#/components/schemas/CommunityMembershipRequestResource'
        visibility:
          type: string
          enum:
            - private
            - public
    PatchCommunityMembershipRequestBody:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - accepted
            - declined
    CommunityMembershipRequestResource:
      type: object
      required:
        - id
        - communityId
        - creatorIdentityId
        - identityId
        - type
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        communityId:
          type: string
        creatorIdentityId:
          type: string
        identityId:
          type: string
        type:
          type: string
          enum:
            - invitation
            - request
        status:
          type: string
          enum:
            - accepted
            - declined
            - pending
        createdAt:
          type: integer
        updatedAt:
          type: integer
    CommunityMembershipRequestsResource:
      type: object
      required:
        - requests
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/CommunityMembershipRequestResource'
    CommunityMembersResource:
      type: object
      required:
        - memberIds
      properties:
        memberIds:
          type: array
          items:
            type: string
    CommunityRolesResource:
      type: object
      required:
        - roles
        - memberRoles
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/CommunityRoleResource'
        memberRoles:
          type: array
          items:
            $ref: '#/components/schemas/CommunityMemberRolesResource'
    CommunityRoleResource:
      type: object
      required:
        - id
        - name
        - permissions
        - builtIn
      properties:
        id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/CommunityPermission'
        builtIn:
          type: boolean
    CommunityMemberRolesResource:
      type: object
      required:
        - identityId
        - roleIds
      properties:
        identityId:
          type: string
        roleIds:
          type: array
          items:
            type: string
    CommunityChannelPermissionsResource:
      type: object
      required:
        - visibleRoleIds
      properties:
        visibleRoleIds:
          type: array
          description: Role ids that can see and access the channel. Use everyone for all members.
          items:
            type: string
    CommunityInviteResource:
      type: object
      required:
        - inviteToken
        - communityId
        - maxUses
        - uses
      properties:
        inviteToken:
          type: string
        communityId:
          type: string
        encryptedCommunityKey:
          $ref: '#/components/schemas/EncryptedCommunityInviteKey'
        expiresAt:
          type: integer
        maxUses:
          type: integer
        uses:
          type: integer
    CommunityInviteDetailsResource:
      allOf:
        - $ref: '#/components/schemas/CommunityInviteResource'
        - type: object
          required:
            - communityName
          properties:
            communityAvatar:
              type: string
            communityBanner:
              type: string
            communityName:
              type: string
    CommunityChannelsResource:
      type: object
      required:
        - channels
      properties:
        channels:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/CommunityTextChannelResource'
              - $ref: '#/components/schemas/CommunityVoiceChannelResource'
    CommunityChannelMessageResource:
      type: object
      required:
        - id
        - communityId
        - channelId
        - authorIdentityId
        - attachmentExternalIdentifiers
        - mentions
        - reactions
        - type
        - createdAt
      properties:
        id:
          type: string
        communityId:
          type: string
        channelId:
          type: string
        authorIdentityId:
          type: string
        encryptedPayload:
          type: string
          description: Present for sent private community messages. Omitted for public messages and poll timeline items.
        plaintextPayload:
          type: string
          description: Present for sent public community messages. Omitted for private messages and poll timeline items.
        signature:
          type: string
          description: Present for sent messages. Omitted for poll timeline items.
        attachmentExternalIdentifiers:
          type: array
          items:
            type: string
        mentions:
          type: array
          description: Visible mention metadata used for permission checks and notifications. Content remains encrypted.
          items:
            $ref: '#/components/schemas/CommunityMessageMentionResource'
        type:
          type: string
          enum:
            - poll
            - sent
        pollId:
          type: string
          description: Present for poll timeline items. The value matches id.
        replyToMessageId:
          type: string
          description: Optional id of the message this channel message replies to.
        createdAt:
          type: integer
        editedAt:
          type: integer
        reactions:
          type: array
          description: OrbitDB replicated reactions synchronized by community events.
          items:
            $ref: '#/components/schemas/CommunityChannelMessageReactionResource'
    CommunityChannelMessageReactionResource:
      type: object
      required:
        - authorIdentityId
        - createdAt
        - emoji
      properties:
        authorIdentityId:
          type: string
        createdAt:
          type: integer
        emoji:
          type: string
    CommunityChannelMessagesResource:
      type: object
      required:
        - communityId
        - channelId
        - messages
      properties:
        communityId:
          type: string
        channelId:
          type: string
        messages:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/CommunityChannelMessageResource'
              - $ref: '../polls-api/swagger.yaml#/components/schemas/Poll'
        nextBeforeMessageId:
          type: string
    CommunityChannelDraftBody:
      type: object
      required:
        - encryptedPayload
      properties:
        encryptedPayload:
          type: string
          description: Opaque encrypted draft payload owned by the authenticated identity.
        updatedAt:
          type: integer
    CommunityChannelDraftResource:
      type: object
      required:
        - communityId
        - channelId
        - encryptedPayload
        - updatedAt
      properties:
        communityId:
          type: string
        channelId:
          type: string
        encryptedPayload:
          type: string
        updatedAt:
          type: integer
    CommunityChannelDraftsResource:
      type: object
      required:
        - drafts
      properties:
        drafts:
          type: array
          items:
            $ref: '#/components/schemas/CommunityChannelDraftResource'
    CommunityChannelMessagePinResource:
      type: object
      required:
        - createdAt
        - message
        - messageId
        - pinnedByIdentityId
      properties:
        createdAt:
          type: integer
        messageId:
          type: string
        pinnedByIdentityId:
          type: string
        message:
          $ref: '#/components/schemas/CommunityChannelMessageResource'
    CommunityChannelMessagePinsResource:
      type: object
      required:
        - communityId
        - channelId
        - pins
      properties:
        communityId:
          type: string
        channelId:
          type: string
        pins:
          type: array
          items:
            $ref: '#/components/schemas/CommunityChannelMessagePinResource'
    CommunityMessageSearchResource:
      type: object
      required:
        - communityId
        - messages
      properties:
        communityId:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/CommunityChannelMessageResource'
    DeletedCommunityChannelMessageResource:
      type: object
      required:
        - id
        - communityId
        - channelId
        - targetMessageId
        - deletedByIdentityId
        - type
      properties:
        id:
          type: string
        communityId:
          type: string
        channelId:
          type: string
        targetMessageId:
          type: string
        deletedByIdentityId:
          type: string
        type:
          type: string
          enum:
            - deleted
    PostCommunityBody:
      type: object
      required:
        - networkId
        - name
        - description
      properties:
        networkId:
          type: string
        name:
          type: string
          maxLength: 80
        description:
          type: string
          maxLength: 500
        avatar:
          type: string
          description: Optional public IPFS CID for the community avatar/icon.
        banner:
          type: string
          description: Optional public IPFS CID for the community banner.
        discoverable:
          type: boolean
          default: true
          description: Set false to keep this community out of discovery search results.
        autoJoinEnabled:
          type: boolean
          default: false
          description: Set true to let any non-banned identity join without owner approval.
        visibility:
          type: string
          default: private
          description: Select private for encrypted channel messages or public for plaintext searchable channel messages. This value is immutable after creation.
          enum:
            - private
            - public
    PatchCommunityBody:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          maxLength: 80
        description:
          type: string
          maxLength: 500
        avatar:
          type: string
          description: Optional public IPFS CID. Omit it to remove the avatar.
        banner:
          type: string
          description: Optional public IPFS CID. Omit it to remove the banner.
        discoverable:
          type: boolean
          description: Set false to keep this community out of discovery search results.
        autoJoinEnabled:
          type: boolean
          description: Set true to let any non-banned identity join without owner approval.
    PostCommunityMemberBody:
      type: object
      required:
        - identityId
      properties:
        identityId:
          type: string
    PostCommunityInviteBody:
      type: object
      properties:
        encryptedCommunityKey:
          $ref: '#/components/schemas/EncryptedCommunityInviteKey'
        expiresAt:
          type: integer
          description: Optional millisecond timestamp after which the invite cannot be accepted.
        maxUses:
          type: integer
          minimum: 1
          default: 1
    EncryptedCommunityInviteKey:
      type: object
      required:
        - version
        - algorithm
        - nonce
        - ciphertext
      properties:
        version:
          type: integer
          enum:
            - 1
        algorithm:
          type: string
          enum:
            - AES-GCM
        nonce:
          type: string
          description: Base64url AES-GCM nonce generated by the frontend.
        ciphertext:
          type: string
          description: Base64url encrypted community key envelope generated by the frontend.
    PostCommunityBanBody:
      type: object
      required:
        - identityId
      properties:
        identityId:
          type: string
        reason:
          type: string
    PostCommunityTextChannelBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 80
    PostCommunityVoiceChannelBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 80
    PatchCommunityChannelBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 80
    CommunityRoleBody:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          maxLength: 50
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/CommunityPermission'
    PutCommunityMemberRolesBody:
      type: object
      required:
        - roleIds
      properties:
        roleIds:
          type: array
          description: Custom role ids to assign. The everyone role is implicit.
          items:
            type: string
    PatchCommunityChannelPermissionsBody:
      type: object
      required:
        - visibleRoleIds
      properties:
        visibleRoleIds:
          type: array
          description: Role ids that can see and access this channel. Use everyone for all members.
          items:
            type: string
    CommunityPermission:
      type: string
      enum:
        - approve_members
        - attach_files
        - ban_members
        - connect_voice
        - create_invites
        - create_polls
        - embed_links
        - manage_channels
        - manage_members
        - manage_messages
        - manage_roles
        - mention_everyone
        - mention_here
        - mention_roles
        - reject_members
        - send_messages
        - send_stickers
        - view_channels
    PostCommunityChannelMessageBody:
      type: object
      required:
        - id
        - createdAt
        - signature
      properties:
        id:
          type: string
        createdAt:
          type: integer
        encryptedPayload:
          type: string
          description: Required for private communities. Client-encrypted payload stored as opaque text.
        plaintextPayload:
          type: string
          description: Required for public communities. Plain text payload stored for indexing/search.
        signature:
          type: string
        attachmentExternalIdentifiers:
          type: array
          items:
            type: string
        mentions:
          type: array
          items:
            $ref: '#/components/schemas/CommunityMessageMentionResource'
        replyToMessageId:
          type: string
          description: Optional id of the existing channel message this message replies to. Include it in the signed canonical payload when present.
    CommunityMessageMentionResource:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - everyone
            - here
            - identity
            - role
        targetId:
          type: string
          description: Identity id or role id for identity/role mentions.
    DeleteCommunityChannelMessageBody:
      type: object
      required:
        - id
        - createdAt
        - signature
      properties:
        id:
          type: string
        createdAt:
          type: integer
        signature:
          type: string
    PutCommunityChannelMessageBody:
      type: object
      required:
        - createdAt
        - signature
      properties:
        createdAt:
          type: integer
          description: Edition timestamp used in the domain signature and returned as editedAt.
        encryptedPayload:
          type: string
          description: Required when editing private community messages. Updated client-encrypted payload stored as opaque text.
        plaintextPayload:
          type: string
          description: Required when editing public community messages. Updated plain text payload stored for indexing/search.
        signature:
          type: string
        attachmentExternalIdentifiers:
          type: array
          items:
            type: string
        mentions:
          type: array
          items:
            $ref: '#/components/schemas/CommunityMessageMentionResource'
    CommunityChannelMessageReactionBody:
      type: object
      required:
        - emoji
      properties:
        emoji:
          type: string
          description: Emoji reaction to add or remove. Unique by community, channel, message, author and emoji.
          maxLength: 64
          example: 👍
