openapi: 3.0.3
info:
  title: Pigeon-swarm Identities API
  version: 1.0.0
  description: Endpoints for creating, updating and resolving identities.
tags:
  - name: identities
paths:
  /identities/:
    post:
      tags:
        - identities
      summary: Create identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostIdentityBody'
      responses:
        '200':
          description: Identity created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
  /identities/{reference}:
    get:
      tags:
        - identities
      summary: Get latest known identity
      parameters:
        - in: path
          name: reference
          required: true
          description: Percent-encoded identity id or profile handle. Clients must use encodeURIComponent(identityId) for identity ids because they can contain path separators and reserved URL characters. Handles may be passed with or without @.
          schema:
            type: string
          example: MCowBQYDK2VwAyEANHSu7gNCaXDe%2Bhzph8c3HomozCnC%2FLdXe13%2FWpeIaVM%3D
      responses:
        '200':
          description: Latest valid identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
    put:
      tags:
        - identities
      summary: Publish signed identity update
      parameters:
        - in: path
          name: reference
          required: true
          description: Percent-encoded identity id.
          schema:
            type: string
        - in: header
          name: X-Identity-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
        - in: header
          name: X-Nonce
          required: true
          schema:
            type: string
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignedIdentityBody'
      responses:
        '200':
          description: Identity updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
components:
  schemas:
    PostIdentityBody:
      oneOf:
        - type: object
          required:
            - name
            - password
            - networks
          properties:
            name:
              type: string
              example: Alice
            handle:
              type: string
              example: '@alice'
            password:
              type: string
              example: super-secret-password
            networks:
              type: array
              items:
                type: string
                format: uuid
        - $ref: '#/components/schemas/SignedIdentityBody'
    SignedIdentityBody:
      type: object
      required:
        - id
        - encryptedKeyPair
        - networks
        - profile
        - timestamp
        - signature
        - version
      properties:
        id:
          type: string
        encryptedKeyPair:
          type: object
          required:
            - encryptedPrivateKey
            - publicKey
          properties:
            encryptedPrivateKey:
              type: string
            publicKey:
              type: string
        networks:
          type: array
          items:
            type: string
            format: uuid
        profile:
          type: object
          required:
            - name
          properties:
            name:
              type: string
            handle:
              type: string
              description: Normalized lowercase handle without @ for client-signed identities.
            biography:
              type: string
              nullable: true
            picture:
              type: string
              nullable: true
              description: Public IPFS image CID returned by POST /ipfs/public-images.
              example: bafybeigdyrztomockimagecid
        timestamp:
          type: number
        signature:
          type: string
        version:
          type: integer
        identityExternalIdentifier:
          type: string
          nullable: true
          description: Current published identity CID. Use it as previousIdentityExternalIdentifier in the next signed identity update.
        previousIdentityExternalIdentifier:
          type: string
          nullable: true
    IdentityResource:
      type: object
      required:
        - id
        - encryptedKeyPair
        - profile
        - networks
        - timestamp
        - signature
        - version
      properties:
        id:
          type: string
          example: MCowBQYDK2VwAyEANHSu7gNCaXDe+hzph8c3HomozCnC/LdXe13/WpeIaVM=
        encryptedKeyPair:
          type: object
          required:
            - encryptedPrivateKey
            - publicKey
          properties:
            encryptedPrivateKey:
              type: string
              example: 2s2IhQsbhsmzNWia+DRGOMIQHEcR+Gi45fSM6Di1FOhOPFTs1NB3Fzhi8/bCEcmGdn0WRq5AjN1pb8iZkZpGpNstPm9v4gcPbGqAUnGCAtAQqiPMiJ1Tr9YQCSIUodxwfowdFvBAZaFGNcoObVoYJgnRjWWq2YQ=.f1itGk2AXdi33/e8.OEIZELL7lzYRXWwFSB0wtA==.CuZAT6/b/TiVLT+sp03ULg==
            publicKey:
              type: string
              example: -----BEGIN PUBLIC KEY-----\nMCowBQYDK2VwAyEANHSu7gNCaXDe+hzph8c3HomozCnC/LdXe13/WpeIaVM=\n-----END PUBLIC KEY-----\n
        networks:
          type: array
          items:
            type: string
            format: uuid
        profile:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              example: Alice
            handle:
              type: string
              nullable: true
              example: alice
            biography:
              type: string
              example: I'm just a regular user of the Pigeon-swarm app!
              nullable: true
            picture:
              type: string
              nullable: true
              description: Public IPFS image CID returned by POST /ipfs/public-images.
              example: bafybeigdyrztomockimagecid
        timestamp:
          type: number
        signature:
          type: string
          example: lWbIzBOHn7vYKk3WOB9JMvOq9XeXRRy8qvqh8DRPrvUL839Y6DEFGDgPTTMngt+pBugsWSK6LoTKKULTy8joBw==
        version:
          type: integer
          example: 1
        identityExternalIdentifier:
          type: string
          nullable: true
          example: bafybeigdyrztomockidentitycid
          description: Current published identity CID. Use it as previousIdentityExternalIdentifier in the next signed identity update.
        previousIdentityExternalIdentifier:
          type: string
          nullable: true
