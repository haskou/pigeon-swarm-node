openapi: 3.0.3
info:
  title: Pigeon-swarm Identities API
  version: 1.0.0
  description: Endpoints for publishing, updating and resolving signed identities.
tags:
  - name: identities
paths:
  /identities/:
    post:
      tags:
        - identities
      summary: Publish signed identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostIdentityBody'
      responses:
        '200':
          description: Identity published successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
  /identities/{reference}:
    get:
      tags:
        - identities
      summary: Get latest known identity
      parameters:
        - in: path
          name: reference
          required: true
          description: Percent-encoded identity id or profile handle. Clients must use encodeURIComponent(identityId) for identity ids because they can contain path separators and reserved URL characters. Handles may be passed with or without @.
          schema:
            type: string
          example: MCowBQYDK2VwAyEANHSu7gNCaXDe%2Bhzph8c3HomozCnC%2FLdXe13%2FWpeIaVM%3D
      responses:
        '200':
          description: Latest valid identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
    put:
      tags:
        - identities
      summary: Publish signed identity update
      parameters:
        - in: path
          name: reference
          required: true
          description: Percent-encoded identity id.
          schema:
            type: string
        - in: header
          name: X-Identity-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignedIdentityBody'
      responses:
        '200':
          description: Identity updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
components:
  schemas:
    PostIdentityBody:
      $ref: '#/components/schemas/SignedIdentityBody'
    SignedIdentityBody:
      type: object
      required:
        - id
        - encryptedKeyPair
        - encryptedMasterKey
        - masterKeyDerivation
        - networks
        - profile
        - timestamp
        - signature
        - version
      properties:
        id:
          type: string
        encryptedKeyPair:
          type: object
          required:
            - encryptedPrivateKey
            - publicKey
          properties:
            encryptedPrivateKey:
              type: string
              description: Opaque encrypted private key blob. Backend stores and signs it but never decrypts it.
            publicKey:
              type: string
        encryptedMasterKey:
          type: string
          description: Opaque encrypted identity master key. Backend stores and signs it but does not decrypt it.
        masterKeyDerivation:
          type: object
          additionalProperties: true
          description: Opaque client-controlled metadata required to decrypt encryptedMasterKey. Backend stores and signs the complete object but never interprets or decrypts recovery keys, passkey PRF envelopes, KEKs, MasterKey material or keychains. New identities may omit passkeyPrf.
        networks:
          type: array
          description: Identity networks. Signed updates may add networks but cannot remove existing ones.
          items:
            type: string
            format: uuid
        profile:
          type: object
          required:
            - name
          properties:
            name:
              type: string
            handle:
              type: string
              description: Normalized lowercase handle without @ or spaces. Allowed characters are letters, numbers, dots, hyphens and underscores.
              pattern: '^[A-Za-z0-9._-]{3,32}$'
            biography:
              type: string
              nullable: true
            picture:
              type: string
              nullable: true
              description: Public IPFS content CID for the profile image/avatar returned by POST /ipfs/public.
              example: bafybeigdyrztomockimagecid
            banner:
              type: string
              nullable: true
              description: Public IPFS content CID for the profile banner returned by POST /ipfs/public.
              example: bafybeigdyrztomockbannercid
        timestamp:
          type: number
        signature:
          type: string
        version:
          type: integer
        identityExternalIdentifier:
          type: string
          nullable: true
          description: Current published identity CID. Use it as previousIdentityExternalIdentifier in the next signed identity update.
        previousIdentityExternalIdentifier:
          type: string
          nullable: true
    IdentityResource:
      type: object
      required:
        - id
        - encryptedKeyPair
        - encryptedMasterKey
        - masterKeyDerivation
        - profile
        - networks
        - timestamp
        - signature
        - version
      properties:
        id:
          type: string
          example: MCowBQYDK2VwAyEANHSu7gNCaXDe+hzph8c3HomozCnC/LdXe13/WpeIaVM=
        encryptedKeyPair:
          type: object
          required:
            - encryptedPrivateKey
            - publicKey
          properties:
            encryptedPrivateKey:
              type: string
              description: Opaque encrypted private key blob. Backend stores and signs it but never decrypts it.
              example: 2s2IhQsbhsmzNWia+DRGOMIQHEcR+Gi45fSM6Di1FOhOPFTs1NB3Fzhi8/bCEcmGdn0WRq5AjN1pb8iZkZpGpNstPm9v4gcPbGqAUnGCAtAQqiPMiJ1Tr9YQCSIUodxwfowdFvBAZaFGNcoObVoYJgnRjWWq2YQ=.f1itGk2AXdi33/e8.OEIZELL7lzYRXWwFSB0wtA==.CuZAT6/b/TiVLT+sp03ULg==
            publicKey:
              type: string
              example: -----BEGIN PUBLIC KEY-----\nMCowBQYDK2VwAyEANHSu7gNCaXDe+hzph8c3HomozCnC/LdXe13/WpeIaVM=\n-----END PUBLIC KEY-----\n
        encryptedMasterKey:
          type: string
          description: Opaque encrypted identity master key. The backend never decrypts it.
          example: v1.aes-gcm.exampleEncryptedMasterKey
        masterKeyDerivation:
          type: object
          additionalProperties: true
          description: Opaque derivation metadata used by clients to decrypt encryptedMasterKey. Backend stores and signs the complete object, including recoveryKey when present, but never interprets or decrypts recovery keys, passkey PRF envelopes, KEKs, MasterKey material or keychains. passkeyPrf is optional because local WebAuthn PRF envelopes may remain only on the client.
          example:
            algorithm: scrypt
            N: 262144
            r: 8
            p: 1
            salt: base64urlSalt
            version: 1
            recoveryKey:
              algorithm: pigeon-recovery-key
              version: 1
        networks:
          type: array
          items:
            type: string
            format: uuid
        profile:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              example: Alice
            handle:
              type: string
              nullable: true
              description: Lowercase profile handle without @ or spaces.
              pattern: '^[A-Za-z0-9._-]{3,32}$'
              example: alice
            biography:
              type: string
              example: I'm just a regular user of the Pigeon-swarm app!
              nullable: true
            picture:
              type: string
              nullable: true
              description: Public IPFS content CID for the profile image/avatar returned by POST /ipfs/public.
              example: bafybeigdyrztomockimagecid
            banner:
              type: string
              nullable: true
              description: Public IPFS content CID for the profile banner returned by POST /ipfs/public.
              example: bafybeigdyrztomockbannercid
        timestamp:
          type: number
        signature:
          type: string
          example: lWbIzBOHn7vYKk3WOB9JMvOq9XeXRRy8qvqh8DRPrvUL839Y6DEFGDgPTTMngt+pBugsWSK6LoTKKULTy8joBw==
        version:
          type: integer
          example: 1
        identityExternalIdentifier:
          type: string
          nullable: true
          example: bafybeigdyrztomockidentitycid
          description: Current published identity CID. Use it as previousIdentityExternalIdentifier in the next signed identity update.
        previousIdentityExternalIdentifier:
          type: string
          nullable: true
