openapi: 3.0.3
info:
  title: Polls API
  version: 1.0.0
tags:
  - name: polls
paths:
  /polls/:
    post:
      tags: [polls]
      summary: Create a poll in a community text channel or group conversation
      security:
        - signedRequest: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPollBody'
      responses:
        '200':
          description: Created poll.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
  /polls/{pollId}:
    get:
      tags: [polls]
      summary: Get a poll by id
      security:
        - signedRequest: []
      parameters:
        - $ref: '#/components/parameters/PollId'
      responses:
        '200':
          description: Poll.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
  /polls/{pollId}/votes:
    post:
      tags: [polls]
      summary: Cast or replace the authenticated identity vote
      security:
        - signedRequest: []
      parameters:
        - $ref: '#/components/parameters/PollId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPollVoteBody'
      responses:
        '200':
          description: Updated poll.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
  /polls/{pollId}/votes/me:
    delete:
      tags: [polls]
      summary: Remove the authenticated identity vote
      security:
        - signedRequest: []
      parameters:
        - $ref: '#/components/parameters/PollId'
      responses:
        '200':
          description: Updated poll.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
  /polls/{pollId}/close:
    post:
      tags: [polls]
      summary: Close a poll
      security:
        - signedRequest: []
      parameters:
        - $ref: '#/components/parameters/PollId'
      responses:
        '200':
          description: Closed poll.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
components:
  securitySchemes:
    signedRequest:
      type: apiKey
      in: header
      name: X-Signature
  parameters:
    PollId:
      in: path
      name: pollId
      required: true
      schema:
        type: string
  schemas:
    PostPollBody:
      type: object
      required:
        - allowsMultipleVotes
        - options
        - question
        - scopeType
      properties:
        allowsMultipleVotes:
          type: boolean
        channelId:
          type: string
        communityId:
          type: string
        conversationId:
          type: string
        expiresAt:
          type: integer
          nullable: true
        options:
          type: array
          minItems: 2
          maxItems: 10
          items:
            type: object
            required: [id, text]
            properties:
              id:
                type: string
              text:
                type: string
        question:
          type: string
          maxLength: 200
        scopeType:
          type: string
          enum: [community_channel, group_conversation]
    PostPollVoteBody:
      type: object
      required:
        - optionIds
      properties:
        optionIds:
          type: array
          minItems: 1
          items:
            type: string
    Poll:
      type: object
      required:
        - allowsMultipleVotes
        - createdAt
        - creatorIdentityId
        - id
        - options
        - question
        - scope
        - status
        - type
        - votes
      properties:
        allowsMultipleVotes:
          type: boolean
        createdAt:
          type: integer
        creatorIdentityId:
          type: string
        expiresAt:
          type: integer
          nullable: true
        id:
          type: string
        options:
          type: array
          items:
            type: object
            required: [id, text]
            properties:
              id:
                type: string
              text:
                type: string
        question:
          type: string
        scope:
          type: object
          required:
            - networkId
            - type
          properties:
            channelId:
              type: string
            communityId:
              type: string
            conversationId:
              type: string
            networkId:
              type: string
            type:
              type: string
              enum: [community_channel, group_conversation]
        status:
          type: string
          enum: [open, closed]
        type:
          type: string
          enum: [poll]
        votes:
          type: array
          items:
            type: object
            required: [createdAt, optionIds, voterIdentityId]
            properties:
              createdAt:
                type: integer
              optionIds:
                type: array
                items:
                  type: string
              voterIdentityId:
                type: string
